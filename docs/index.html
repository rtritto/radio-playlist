<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Playlist</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .player-container {
      background-color: #1e1e1e;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      width: 350px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      color: #1db954;
      font-size: 1.4em;
    }

    .main-logo-container {
      width: 180px;
      height: 180px;
      margin-bottom: 20px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
      background-color: #2a2a2a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .main-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    .status-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 0.95em;
      color: #aaaaaa;
      margin-bottom: 20px;
      min-height: 24px;
      transition: color 0.3s ease;
      width: 100%;
    }

    .status-container.is-playing {
      color: #1db954;
      font-weight: bold;
    }

    .status-container.is-loading {
      color: #f39c12;
      font-style: italic;
    }

    .status-gif {
      position: absolute;
      left: 0;
      width: 20px;
      height: 20px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
    }

    .status-container.is-playing .status-gif,
    .status-container.is-loading .status-gif {
      opacity: 1;
      visibility: visible;
    }

    .custom-player {
      background-color: #2a2a2a;
      padding: 15px;
      border-radius: 4px;
      width: 100%;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 25px;
    }

    .control-btn {
      background-color: transparent;
      color: #1db954;
      border: none;
      font-size: 26px;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .control-btn:hover {
      transform: scale(1.1);
      color: #1ed760;
    }

    .play-btn {
      font-size: 42px;
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .volume-icon {
      font-size: 20px;
      color: #aaaaaa;
      cursor: pointer;
      width: 24px;
      text-align: center;
      transition: color 0.2s;
    }

    .volume-icon:hover {
      color: #ffffff;
    }

    input[type='range'] {
      flex: 1;
      accent-color: #1db954;
      cursor: pointer;
    }

    ul.playlist {
      list-style-type: none;
      padding: 0;
      margin: 0;
      width: 100%;
    }

    ul.playlist li {
      background-color: #2a2a2a;
      padding: 5px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s ease;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    ul.playlist li:hover {
      background-color: #3a3a3a;
    }

    ul.playlist li.active {
      background-color: #1db954;
      color: #121212;
      font-weight: bold;
    }

    .list-thumb {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    @media (pointer: coarse) {
      .volume-row {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="player-container">
    <h2>Radio Playlist</h2>

    <div class="main-logo-container">
      <img id="main-logo" class="main-logo">
    </div>

    <div class="status-container" id="status-container">
      <img alt="Status" class="status-gif" id="status-gif">
      <span id="status-text">Select a Radio</span>
    </div>

    <audio id="main-audio" preload="none"></audio>

    <div id="custom-player" class="custom-player">
      <div class="controls-row">
        <button class="control-btn" id="prev-btn">⏮</button>
        <button class="control-btn play-btn" id="play-pause-btn">▶</button>
        <button class="control-btn" id="next-btn">⏭</button>
      </div>
      <div class="volume-row" id="volume-row">
        <span class="volume-icon" id="dynamic-volume-icon" title="Mute/Unmute">🔊</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
      </div>
    </div>

    <ul class="playlist" id="playlist">
      <li data-url="https://s2.radio.co/s2b2b68744/listen">
        <img src="./public/badradio.png" class="list-thumb" alt="badradio">
        <span>badradio</span>
      </li>
      <li data-url="https://phonk.stream.laut.fm/phonk?ref=web-app">
        <img src="./public/laut.fm.png" class="list-thumb" alt="Phonk">
        <span>laut.fm - Phonk</span>
      </li>
      <li data-url="https://stream.zeno.fm/90fvpb27u18uv">
        <img src="./public/zeno-phonk.jpg" class="list-thumb" alt="Phonk">
        <span>Radio Zeno - Phonk</span>
      </li>
      <li data-url="https://stream.zeno.fm/u8r9xbvr5f0uv">
        <img src="./public/initial-d-world.jpg" class="list-thumb" alt="Initial D">
        <span>Radio Zeno - Initial D</span>
      </li>
      <li data-url="https://pool.anison.fm:9000/AniSonFM(320)">
        <img src="./public/anison.png" class="list-thumb" alt="Anison">
        <span>Anison FM</span>
      </li>
      <li data-url="https://centova4.transmissaodigital.com:20143/principal">
        <img src="./public/blast.png" class="list-thumb" alt="Radio Blast">
        <span>Radio Blast!</span>
      </li>
      <li data-url="https://s3.radio.co/sff133d65b/listen">
        <img src="./public/ronin.jpg" class="list-thumb" alt="Ronin Radio">
        <span>Ronin Radio</span>
      </li>
    </ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('main-audio')
    const playlist = document.getElementById('playlist')
    const playlistItems = Array.from(playlist.children)
    const statusContainer = document.getElementById('status-container')
    const statusText = document.getElementById('status-text')
    const statusGif = document.getElementById('status-gif')
    const mainLogo = document.getElementById('main-logo')
    const playPauseBtn = document.getElementById('play-pause-btn')
    const prevBtn = document.getElementById('prev-btn')
    const nextBtn = document.getElementById('next-btn')
    const volumeSlider = document.getElementById('volume-slider')
    const dynamicVolumeIcon = document.getElementById('dynamic-volume-icon')
    const customPlayerControls = document.getElementById('custom-player')
    const volumeRow = document.getElementById('volume-row')
    const isMobile = matchMedia('(pointer: coarse)').matches

    const PLAY_ICON = '▶'
    const PAUSE_ICON = '❚❚'
    const URL_GIF_PLAYING = './public/equaliser-animated-green.gif'
    const URL_GIF_LOADING = './public/loading.gif'
    const LOCAL_STORAGE_VOLUME_KEY = 'radio_playlist_volume'

    let currentIndex = -1
    let lastVolume = 1

    audioPlayer.addEventListener('waiting', () => {
      statusContainer.classList.remove('is-playing')
      statusContainer.classList.add('is-loading')
      statusGif.src = URL_GIF_LOADING
      playPauseBtn.innerText = PAUSE_ICON
    })

    audioPlayer.addEventListener('playing', () => {
      statusContainer.classList.remove('is-loading')
      statusContainer.classList.add('is-playing')
      statusGif.src = URL_GIF_PLAYING
      playPauseBtn.innerText = PAUSE_ICON
    })

    audioPlayer.addEventListener('pause', () => {
      statusContainer.classList.remove('is-playing', 'is-loading')
      playPauseBtn.innerText = PLAY_ICON
    })

    audioPlayer.addEventListener('error', () => {
      statusContainer.classList.remove('is-playing', 'is-loading')
      statusText.innerText = '❌ Stream error'
      playPauseBtn.innerText = PLAY_ICON
    })

    const loadAndPlay = (index) => {
      if (index < 0 || index >= playlistItems.length) return

      currentIndex = index

      playlistItems.forEach(li => li.classList.remove('active'))
      const activeItem = playlistItems[currentIndex]
      activeItem.classList.add('active')

      mainLogo.style.opacity = 0
      setTimeout(() => {
        mainLogo.src = activeItem.querySelector('img').src
        mainLogo.style.opacity = 1
      }, 150)

      statusText.innerText = activeItem.querySelector('span').innerText.trim()

      statusContainer.classList.remove('is-playing')
      statusContainer.classList.add('is-loading')
      statusGif.src = URL_GIF_LOADING
      playPauseBtn.innerText = PAUSE_ICON

      audioPlayer.src = activeItem.getAttribute('data-url')
      audioPlayer.play().catch(() => { })
    }

    playPauseBtn.addEventListener('click', () => {
      if (currentIndex === -1) {
        loadAndPlay(0)
        return
      }
      if (!audioPlayer.paused) audioPlayer.pause()
      else audioPlayer.play()
    })

    prevBtn.addEventListener('click', () => {
      if (currentIndex === -1) return
      let newIndex = currentIndex - 1
      if (newIndex < 0) newIndex = playlistItems.length - 1
      loadAndPlay(newIndex)
    })

    nextBtn.addEventListener('click', () => {
      if (currentIndex === -1) return
      let newIndex = currentIndex + 1
      if (newIndex >= playlistItems.length) newIndex = 0
      loadAndPlay(newIndex)
    })

    playlist.addEventListener('click', (e) => {
      const clickedItem = e.target.closest('li')
      if (!clickedItem) return

      const index = playlistItems.indexOf(clickedItem)
      if (index !== -1) loadAndPlay(index)
    })

    const applyVolume = (vol) => {
      vol = Math.max(0, Math.min(1, vol))
      audioPlayer.volume = vol
      volumeSlider.value = vol
      dynamicVolumeIcon.innerText = vol === 0 ? '🔇' : vol < 0.35 ? '🔈' : vol < 0.75 ? '🔉' : '🔊'
      if (vol > 0) lastVolume = vol
      localStorage.setItem(LOCAL_STORAGE_VOLUME_KEY, vol)
    }

    if (isMobile) {
      audioPlayer.volume = 1
      volumeRow.style.display = 'none'
    } else {
      const savedVolume = localStorage.getItem(LOCAL_STORAGE_VOLUME_KEY)
      applyVolume(savedVolume !== null ? parseFloat(savedVolume) : 1)

      volumeSlider.addEventListener('input', (e) => {
        applyVolume(parseFloat(e.target.value))
      })

      dynamicVolumeIcon.addEventListener('click', () => {
        applyVolume(audioPlayer.volume > 0 ? 0 : lastVolume)
      })

      customPlayerControls.addEventListener('wheel', (e) => {
        e.preventDefault()
        applyVolume(audioPlayer.volume + (e.deltaY < 0 ? 0.1 : -0.1))
      }, { passive: false })
    }
  </script>
</body>

</html>
