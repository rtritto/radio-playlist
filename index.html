<!DOCTYPE html>
<html lang='it'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Radio from Japan 🇯🇵</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .player-container {
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-top: 0;
      color: #1db954;
    }

    .status-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 0.9em;
      color: #aaaaaa;
      margin-bottom: 20px;
      min-height: 24px;
      transition: color 0.3s ease;
    }

    .status-container.is-playing {
      color: #1db954;
      font-weight: bold;
    }

    .status-gif {
      position: absolute;
      left: 20px;
      width: 20px;
      height: 20px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
    }

    .status-container.is-playing .status-gif {
      opacity: 1;
      visibility: visible;
    }

    .custom-player {
      background-color: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    .control-btn {
      background-color: transparent;
      color: #1db954;
      border: none;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      transform: scale(1.1);
      color: #1ed760;
    }

    .play-btn {
      font-size: 36px;
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .volume-icon {
      font-size: 20px;
      color: #aaaaaa;
      cursor: pointer;
      width: 24px;
      text-align: center;
      transition: color 0.2s;
    }

    .volume-icon:hover {
      color: #ffffff;
    }

    input[type='range'] {
      flex: 1;
      accent-color: #1db954;
      cursor: pointer;
    }

    ul.playlist {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    ul.playlist li {
      background-color: #2a2a2a;
      padding: 12px 15px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
      display: flex;
      align-items: center;
    }

    ul.playlist li:hover {
      background-color: #3a3a3a;
    }

    ul.playlist li.active {
      background-color: #1db954;
      color: #121212;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="player-container">
    <h2>Radio from Japan 🇯🇵</h2>

    <div class="status-container" id="status-container">
      <img src="./equaliser-animated-green.gif" alt="Playing" class="status-gif" id="status-gif">
      <span id="status-text">Select a Radio</span>
    </div>

    <audio id="main-audio" preload="none"></audio>

    <div id="custom-player" class="custom-player">
      <div class="controls-row">
        <button class="control-btn" id="prev-btn">⏮</button>
        <button class="control-btn play-btn" id="play-pause-btn">▶</button>
        <button class="control-btn" id="next-btn">⏭</button>
      </div>
      <div class="volume-row">
        <span class="volume-icon" id="dynamic-volume-icon" title="Mute/Unmute">🔊</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
      </div>
    </div>

    <ul class="playlist" id="playlist">
      <li data-url="https://s2.radio.co/s2b2b68744/listen">
        📻 badradio
      </li>
      <li data-url="https://stream-152.zeno.fm/90fvpb27u18uv">
        📻 Radio Zeno - Phonk
      </li>
      <li data-url="https://stream-178.zeno.fm/u8r9xbvr5f0uv">
        🚗 Radio Zeno - Initial D
      </li>
      <li data-url="https://pool.anison.fm:9000/AniSonFM(320)">
        📻 Anison FM
      </li>
      <li data-url="https://centova4.transmissaodigital.com:20143/principal">
        📻 Radio Blast!
      </li>
      <li data-url="https://s3.radio.co/sff133d65b/listen">
        📻 Ronin Radio
      </li>
    </ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('main-audio')
    const playlist = document.getElementById('playlist')
    const playlistItems = Array.from(playlist.children)
    const statusContainer = document.getElementById('status-container')
    const statusText = document.getElementById('status-text')
    const playPauseBtn = document.getElementById('play-pause-btn')
    const prevBtn = document.getElementById('prev-btn')
    const nextBtn = document.getElementById('next-btn')
    const volumeSlider = document.getElementById('volume-slider')
    const dynamicVolumeIcon = document.getElementById('dynamic-volume-icon')
    const customPlayerControls = document.getElementById('custom-player') 
    
    const PLAY_ICON = '▶'
    const PAUSE_ICON = '❚❚'
    let currentIndex = -1
    let isPlaying = false
    let lastVolume = 1

    const loadAndPlay = (index) => {
      if (index < 0 || index >= playlistItems.length) return

      currentIndex = index

      playlistItems.forEach(li => li.classList.remove('active'))
      const activeItem = playlistItems[currentIndex]
      activeItem.classList.add('active')

      audioPlayer.src = activeItem.getAttribute('data-url')
      
      audioPlayer.play()
        .then(() => {
          statusText.innerText = activeItem.innerText.trim()
          playPauseBtn.innerText = PAUSE_ICON
          statusContainer.classList.add('is-playing')
          isPlaying = true
        })
        .catch(() => {
          playPauseBtn.innerText = PLAY_ICON
          statusContainer.classList.remove('is-playing')
          isPlaying = false
        })
    }

    // Play/Pause
    playPauseBtn.addEventListener('click', () => {
      if (currentIndex === -1) {
        loadAndPlay(0)
        return
      }

      if (isPlaying) {
        audioPlayer.pause()
        playPauseBtn.innerText = PLAY_ICON
        statusContainer.classList.remove('is-playing')
        isPlaying = false
      } else {
        audioPlayer.play()
        playPauseBtn.innerText = PAUSE_ICON
        statusContainer.classList.add('is-playing')
        isPlaying = true
      }
    })

    // Prev
    prevBtn.addEventListener('click', () => {
      if (currentIndex === -1) return
      let newIndex = currentIndex - 1
      if (newIndex < 0) newIndex = playlistItems.length - 1
      loadAndPlay(newIndex)
    })

    // Next
    nextBtn.addEventListener('click', () => {
      if (currentIndex === -1) return
      let newIndex = currentIndex + 1
      if (newIndex >= playlistItems.length) newIndex = 0
      loadAndPlay(newIndex)
    })

    const updateVolumeIcon = (vol) => {
      if (vol === 0) {
        dynamicVolumeIcon.innerText = '🔇'
      } else if (vol < 0.35) {
        dynamicVolumeIcon.innerText = '🔈'
      } else if (vol < 0.75) {
        dynamicVolumeIcon.innerText = '🔉'
      } else {
        dynamicVolumeIcon.innerText = '🔊'
      }
    }

    // Input Slider Volume
    volumeSlider.addEventListener('input', (e) => {
      const currentVolume = parseFloat(e.target.value)
      audioPlayer.volume = currentVolume
      updateVolumeIcon(currentVolume)
      if (currentVolume > 0) {
        // Update the last known volume
        lastVolume = currentVolume
      }
    })

    // Click on volume icon
    dynamicVolumeIcon.addEventListener('click', () => {
      if (audioPlayer.volume > 0) {
        // Mute
        audioPlayer.volume = 0
        volumeSlider.value = 0
        updateVolumeIcon(0)
      } else {
        // Restore previous volume
        audioPlayer.volume = lastVolume
        volumeSlider.value = lastVolume
        updateVolumeIcon(lastVolume)
      }
    })

    customPlayerControls.addEventListener('wheel', (e) => {
      e.preventDefault()
      
      const STEP = 0.1
      let newVolume = audioPlayer.volume

      if (e.deltaY < 0) {
        newVolume += STEP
      } else {
        newVolume -= STEP
      }

      newVolume = Math.max(0, Math.min(1, newVolume))

      audioPlayer.volume = newVolume
      volumeSlider.value = newVolume
      updateVolumeIcon(newVolume)

      if (newVolume > 0) {
        lastVolume = newVolume
      }
    })

    playlist.addEventListener('click', (e) => {
      const clickedItem = e.target.closest('li')

      if (!clickedItem) return 

      const index = playlistItems.indexOf(clickedItem)
      if (index !== -1) {
        loadAndPlay(index)
      }
    })

    // Error Handling
    audioPlayer.addEventListener('error', () => {
      statusText.innerText = 'Stream error ❌'
      playPauseBtn.innerText = PLAY_ICON
      statusContainer.classList.remove('is-playing')
      isPlaying = false
    })
  </script>
</body>
</html>
