<!DOCTYPE html>
<html lang='en'>

<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Radio from Japan 🇯🇵</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .player-container {
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-top: 0;
      color: #1db954;
    }

    .status-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 0.9em;
      color: #aaaaaa;
      margin-bottom: 20px;
      min-height: 24px;
      transition: color 0.3s ease;
    }

    .status-container.is-playing {
      color: #1db954;
      font-weight: bold;
    }

    .status-container.is-loading {
      color: #f39c12;
      font-style: italic;
    }

    .status-gif {
      position: absolute;
      left: 20px;
      width: 20px;
      height: 20px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
    }

    .status-container.is-playing .status-gif,
    .status-container.is-loading .status-gif {
      opacity: 1;
      visibility: visible;
    }

    .custom-player {
      background-color: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      user-select: none;
      -webkit-user-select: none;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    .control-btn {
      background-color: transparent;
      color: #1db954;
      border: none;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .control-btn:hover {
      transform: scale(1.1);
      color: #1ed760;
    }

    .play-btn {
      font-size: 36px;
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .volume-icon {
      font-size: 20px;
      color: #aaaaaa;
      cursor: pointer;
      width: 24px;
      text-align: center;
      transition: color 0.2s;
    }

    .volume-icon:hover {
      color: #ffffff;
    }

    input[type='range'] {
      flex: 1;
      accent-color: #1db954;
      cursor: pointer;
    }

    ul.playlist {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    ul.playlist li {
      background-color: #2a2a2a;
      padding: 12px 15px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
      display: flex;
      align-items: center;
    }

    ul.playlist li:hover {
      background-color: #3a3a3a;
    }

    ul.playlist li.active {
      background-color: #1db954;
      color: #121212;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="player-container">
    <h2>Radio from Japan 🇯🇵</h2>

    <div class="status-container" id="status-container">
      <img alt="Status" class="status-gif" id="status-gif">
      <span id="status-text">Select a Radio</span>
    </div>

    <audio id="main-audio" preload="none"></audio>

    <div id="custom-player" class="custom-player">
      <div class="controls-row">
        <button class="control-btn" id="prev-btn">⏮</button>
        <button class="control-btn play-btn" id="play-pause-btn">▶</button>
        <button class="control-btn" id="next-btn">⏭</button>
      </div>
      <div class="volume-row">
        <span class="volume-icon" id="dynamic-volume-icon" title="Mute/Unmute">🔊</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
      </div>
    </div>

    <ul class="playlist" id="playlist">
      <li data-url="https://s2.radio.co/s2b2b68744/listen">
        📻 badradio
      </li>
      <li data-url="https://stream-152.zeno.fm/90fvpb27u18uv">
        📻 Radio Zeno - Phonk
      </li>
      <li data-url="https://stream-178.zeno.fm/u8r9xbvr5f0uv">
        🚗 Radio Zeno - Initial D
      </li>
      <li data-url="https://pool.anison.fm:9000/AniSonFM(320)">
        📻 Anison FM
      </li>
      <li data-url="https://centova4.transmissaodigital.com:20143/principal">
        📻 Radio Blast!
      </li>
      <li data-url="https://s3.radio.co/sff133d65b/listen">
        📻 Ronin Radio
      </li>
    </ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('main-audio')
    const playlist = document.getElementById('playlist')
    const playlistItems = Array.from(playlist.children)
    const statusContainer = document.getElementById('status-container')
    const statusText = document.getElementById('status-text')
    const statusGif = document.getElementById('status-gif')
    const playPauseBtn = document.getElementById('play-pause-btn')
    const prevBtn = document.getElementById('prev-btn')
    const nextBtn = document.getElementById('next-btn')
    const volumeSlider = document.getElementById('volume-slider')
    const dynamicVolumeIcon = document.getElementById('dynamic-volume-icon')
    const customPlayerControls = document.getElementById('custom-player')

    const PLAY_ICON = '▶'
    const PAUSE_ICON = '❚❚'
    const URL_GIF_PLAYING = './equaliser-animated-green.gif'
    const URL_GIF_LOADING = './loading.gif'
    const LOCAL_STORAGE_KEY = 'japan_radio_volume'

    let currentIndex = -1
    let lastVolume = 1

    audioPlayer.addEventListener('waiting', () => {
      statusContainer.classList.remove('is-playing')
      statusContainer.classList.add('is-loading')
      statusGif.src = URL_GIF_LOADING
      playPauseBtn.innerText = PAUSE_ICON
    })

    audioPlayer.addEventListener('playing', () => {
      statusContainer.classList.remove('is-loading')
      statusContainer.classList.add('is-playing')
      statusGif.src = URL_GIF_PLAYING
      playPauseBtn.innerText = PAUSE_ICON
    })

    audioPlayer.addEventListener('pause', () => {
      statusContainer.classList.remove('is-playing', 'is-loading')
      playPauseBtn.innerText = PLAY_ICON
    })

    audioPlayer.addEventListener('error', () => {
      statusContainer.classList.remove('is-playing', 'is-loading')
      statusText.innerText = '❌ Stream error'
      playPauseBtn.innerText = PLAY_ICON
    })

    const loadAndPlay = (index) => {
      if (index < 0 || index >= playlistItems.length) return

      currentIndex = index

      playlistItems.forEach(li => li.classList.remove('active'))
      const activeItem = playlistItems[currentIndex]
      activeItem.classList.add('active')

      statusText.innerText = activeItem.innerText.trim()
      statusContainer.classList.remove('is-playing')
      statusContainer.classList.add('is-loading')
      statusGif.src = URL_GIF_LOADING
      playPauseBtn.innerText = PAUSE_ICON

      audioPlayer.src = activeItem.getAttribute('data-url')
      audioPlayer.play().catch(() => { })
    }

    playPauseBtn.addEventListener('click', () => {
      if (currentIndex === -1) {
        loadAndPlay(0)
        return
      }
      if (!audioPlayer.paused) audioPlayer.pause()
      else audioPlayer.play()
    })

    prevBtn.addEventListener('click', () => {
      if (currentIndex === -1) return
      let newIndex = currentIndex - 1
      if (newIndex < 0) newIndex = playlistItems.length - 1
      loadAndPlay(newIndex)
    })

    nextBtn.addEventListener('click', () => {
      if (currentIndex === -1) return
      let newIndex = currentIndex + 1
      if (newIndex >= playlistItems.length) newIndex = 0
      loadAndPlay(newIndex)
    })

    playlist.addEventListener('click', (e) => {
      const clickedItem = e.target.closest('li')
      if (!clickedItem) return

      const index = playlistItems.indexOf(clickedItem)
      if (index !== -1) loadAndPlay(index)
    })

    const updateVolumeIcon = (vol) => {
      dynamicVolumeIcon.innerText = vol === 0 ? '🔇' : vol < 0.35 ? '🔈' : vol < 0.75 ? '🔉' : '🔊'
    }

    const applyVolume = (vol) => {
      vol = Math.max(0, Math.min(1, vol))

      audioPlayer.volume = vol
      volumeSlider.value = vol
      updateVolumeIcon(vol)

      if (vol > 0) lastVolume = vol
      localStorage.setItem(LOCAL_STORAGE_KEY, vol)
    }

    const savedVolume = localStorage.getItem(LOCAL_STORAGE_KEY)
    if (savedVolume !== null) {
      applyVolume(parseFloat(savedVolume))
    } else {
      applyVolume(1)
    }

    volumeSlider.addEventListener('input', (e) => {
      applyVolume(parseFloat(e.target.value))
    })

    dynamicVolumeIcon.addEventListener('click', () => {
      applyVolume(audioPlayer.volume > 0 ? 0 : lastVolume)
    })

    customPlayerControls.addEventListener('wheel', (e) => {
      e.preventDefault()
      const STEP = 0.1
      applyVolume(audioPlayer.volume + (e.deltaY < 0 ? STEP : -STEP))
    }, { passive: false })

    let touchLastY = 0

    customPlayerControls.addEventListener('touchstart', (e) => {
      touchLastY = e.touches[0].clientY
    }, { passive: true })

    customPlayerControls.addEventListener('touchmove', (e) => {
      if (e.target === volumeSlider) return
      e.preventDefault()

      const currentY = e.touches[0].clientY
      const deltaY = currentY - touchLastY

      if (Math.abs(deltaY) > 8) {
        const STEP = 0.05
        applyVolume(audioPlayer.volume + (deltaY < 0 ? STEP : -STEP))
        touchLastY = currentY
      }
    }, { passive: false })
  </script>
</body>

</html>
