<!DOCTYPE html>
<html lang='it'>

<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Radio from Japan 🇯🇵</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .player-container {
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-top: 0;
      color: #1db954;
    }

    .status {
      text-align: center;
      font-size: 0.9em;
      color: #aaaaaa;
      margin-bottom: 20px;
      min-height: 20px;
    }

    .custom-player {
      background-color: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    .control-btn {
      background-color: transparent;
      color: #1db954;
      border: none;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      transform: scale(1.1);
      color: #1ed760;
    }

    .play-btn {
      font-size: 36px;
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .volume-icon {
      font-size: 18px;
      color: #aaaaaa;
    }

    input[type='range'] {
      flex: 1;
      accent-color: #1db954;
      cursor: pointer;
    }

    ul.playlist {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    ul.playlist li {
      background-color: #2a2a2a;
      padding: 12px 15px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
      display: flex;
      align-items: center;
    }

    ul.playlist li:hover {
      background-color: #3a3a3a;
    }

    ul.playlist li.active {
      background-color: #1db954;
      color: #121212;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="player-container">
    <h2>Radio from Japan 🇯🇵</h2>

    <div class="status" id="status-text">Select a Radio</div>

    <audio id="main-audio" preload="none"></audio>

    <div class="custom-player">
      <div class="controls-row">
        <button class="control-btn" id="prev-btn">⏮</button>
        <button class="control-btn play-btn" id="play-pause-btn">▶</button>
        <button class="control-btn" id="next-btn">⏭</button>
      </div>
      <div class="volume-row">
        <span class="volume-icon">🔉</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
        <span class="volume-icon">🔊</span>
      </div>
    </div>

    <ul class="playlist" id="playlist">
      <li data-url="https://s2.radio.co/s2b2b68744/listen">
        📻 badradio
      </li>
      <li data-url="https://stream-152.zeno.fm/90fvpb27u18uv">
        📻 Radio Zeno - Phonk
      </li>
      <li data-url="https://stream-178.zeno.fm/u8r9xbvr5f0uv">
        📻 Radio Zeno - Initial D
      </li>
      <li data-url="https://pool.anison.fm:9000/AniSonFM(320)">
        📻 Anison FM
      </li>
    </ul>
  </div>

  <script>
    const audioPlayer = document.getElementById('main-audio')
    const playlistItems = document.querySelectorAll('#playlist li')
    const statusText = document.getElementById('status-text')
    const playPauseBtn = document.getElementById('play-pause-btn')
    const prevBtn = document.getElementById('prev-btn')
    const nextBtn = document.getElementById('next-btn')
    const volumeSlider = document.getElementById('volume-slider')
    const ERROR_MESSAGE = 'Stream error ❌'
    const PLAY_ICON = '▶'

    let currentIndex = -1
    let isPlaying = false

    const loadAndPlay = (index) => {
      if (index < 0 || index >= playlistItems.length) return

      currentIndex = index

      playlistItems.forEach(li => li.classList.remove('active'))
      const activeItem = playlistItems[currentIndex]
      activeItem.classList.add('active')

      audioPlayer.src = activeItem.getAttribute('data-url')
      
      audioPlayer.play()
        .then(() => {
          statusText.innerText = activeItem.innerText.trim()
          playPauseBtn.innerText = '❚❚'
          isPlaying = true
        })
        .catch(() => {
          statusText.innerText = ERROR_MESSAGE
          playPauseBtn.innerText = PLAY_ICON
          isPlaying = false
        })
    }

    // Play / Pause
    playPauseBtn.addEventListener('click', () => {
      if (currentIndex === -1) {
        loadAndPlay(0)
        return
      }

      if (isPlaying) {
        audioPlayer.pause()
        playPauseBtn.innerText = PLAY_ICON
        // statusText.innerText = 'Paused'
        isPlaying = false
      } else {
        audioPlayer.play()
        playPauseBtn.innerText = '❚❚'
        statusText.innerText = playlistItems[currentIndex].innerText.trim()
        isPlaying = true
      }
    })

    // Prev
    prevBtn.addEventListener('click', () => {
      if (currentIndex === -1) return
      let newIndex = currentIndex - 1
      if (newIndex < 0) newIndex = playlistItems.length - 1
      loadAndPlay(newIndex)
    })

    // Next
    nextBtn.addEventListener('click', () => {
      if (currentIndex === -1) return
      let newIndex = currentIndex + 1
      if (newIndex >= playlistItems.length) newIndex = 0
      loadAndPlay(newIndex)
    })

    // Volume
    volumeSlider.addEventListener('input', (e) => {
      audioPlayer.volume = e.target.value
    })

    // Click on Playlist
    playlistItems.forEach((item, index) => {
      item.addEventListener('click', () => {
        loadAndPlay(index)
      })
    })

    // Error Handling
    audioPlayer.addEventListener('error', () => {
      statusText.innerText = ERROR_MESSAGE
      playPauseBtn.innerText = PLAY_ICON
      isPlaying = false
    })
  </script>

</body>

</html>
